name: AI CI Fixer
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  fix-ci:
    runs-on: self-hosted
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Install dependencies
        run: python -m pip install groq requests
      - name: Run AI CI Fixer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_USERNAME: sanrishi
          PYTHONUTF8: "1"
        run: python -u scripts/ci_fixer.py