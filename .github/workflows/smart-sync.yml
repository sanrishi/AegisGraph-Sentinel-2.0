name: Smart Branch Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  smart-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Puneet04-tech/AegisGraph-Sentinel-2.0.git
          git fetch upstream

      - name: Smart rebase each branch
        run: |
          for branch in $(git branch -r | grep 'origin/' | grep -v 'HEAD\|master\|main' | sed 's/origin\///'); do
            echo "Processing $branch..."
            git checkout -b $branch origin/$branch 2>/dev/null || git checkout $branch

            # First attempt: patience algorithm (preserves both sides cleanly)
            if git rebase upstream/master -s recursive -X patience; then
              echo "✅ $branch: clean rebase, pushing..."
              git push origin $branch --force
              continue
            fi

            # Second attempt: accept upstream changes on conflicting lines
            git rebase --abort
            if git rebase upstream/master -s recursive -X theirs; then
              echo "✅ $branch: auto-resolved with upstream, pushing..."
              git push origin $branch --force
            else
              git rebase --abort
              echo "CONFLICT::$branch" >> /tmp/conflict_branches.txt
            fi
          done

      - name: Open issue for real conflicts
        if: always()
        run: |
          if [ -f /tmp/conflict_branches.txt ]; then
            BRANCHES=$(cat /tmp/conflict_branches.txt | sed 's/CONFLICT:://g' | tr '\n' ', ')
            gh issue create \
              --title "⚠️ Real conflicts need your attention: $BRANCHES" \
              --body "These branches have genuine conflicts that automation cannot resolve: $BRANCHES. All other branches were successfully rebased." \
              --label "conflict"
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}